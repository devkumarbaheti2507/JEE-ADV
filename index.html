<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Advanced Simulator - CBT Interface</title>
    <style>
        :root {
            --primary-blue: #0056b3;
            --light-bg: #f4f7f6;
            --border-color: #ccc;
            --gray-status: #e0e0e0;
            --red-status: #dc3545;
            --green-status: #28a745;
            --warning-color: #ffcc00;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #fff;
            margin: 0;
            padding: 0;
            color: #333;
            user-select: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        #top-bar {
            background: var(--primary-blue);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
        }
        .warning-banner {
            background-color: var(--warning-color);
            color: #333;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        #selection-screen, #result-screen, #review-screen {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        #review-screen {
            max-width: 1000px;
            height: 80vh;
            display: flex;
            flex-direction: column;
        }

        #review-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .paper-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .btn-large { padding: 15px; font-size: 16px; background-color: #fff; border: 2px solid var(--primary-blue); color: var(--primary-blue); border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-large:hover { background-color: var(--primary-blue); color: #fff; }

        #test-screen { display: flex; flex: 1; overflow: hidden; background: var(--light-bg); }
        #left-panel { flex: 3; display: flex; flex-direction: column; border-right: 2px solid var(--border-color); background: #fff; }
        #right-panel { flex: 1; min-width: 250px; max-width: 300px; background: #f9f9f9; display: flex; flex-direction: column; }

        #section-tabs { display: flex; background: #e9ecef; border-bottom: 2px solid var(--primary-blue); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-size: 16px; font-weight: bold; cursor: pointer; border-right: 1px solid var(--border-color); }
        .tab-btn.active { background: var(--primary-blue); color: white; }

        #question-area { flex: 1; padding: 20px; overflow-y: auto; font-size: 16px; }
        .question-header { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px; color: #555; font-weight: bold; }
        .question-text img { max-width: 100%; height: auto; display: block; margin: 15px 0; border: 1px solid #ddd; }
        
        .option-label { display: flex; align-items: center; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; }
        .option-label:hover { background: #f0f8ff; }
        .numerical-input { width: 100%; max-width: 300px; padding: 12px; font-size: 16px; border: 2px solid #ccc; border-radius: 4px; outline: none; transition: border-color 0.3s; }
        .numerical-input:focus { border-color: var(--primary-blue); }

        #action-bar { padding: 15px 20px; background: #eee; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; }
        .btn-action { padding: 10px 20px; font-size: 16px; border: none; border-radius: 4px; cursor: pointer; color: white; }
        .btn-clear { background: #6c757d; }
        .btn-save { background: var(--green-status); }

        #palette-header { padding: 15px; background: #e9ecef; text-align: center; font-weight: bold; border-bottom: 1px solid var(--border-color); }
        #palette-grid { padding: 15px; display: flex; flex-wrap: wrap; gap: 10px; overflow-y: auto; }
        .palette-btn { width: 45px; height: 45px; border-radius: 50%; border: 1px solid #999; font-size: 16px; font-weight: bold; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .status-gray { background: var(--gray-status); color: #333; }
        .status-red { background: var(--red-status); }
        .status-green { background: var(--green-status); }
        
        .submit-test-btn { margin: auto 15px 15px 15px; padding: 15px; background: var(--primary-blue); color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }

        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; margin-bottom: 20px;}
        .stat-box { background: #f4f7f6; padding: 15px; border-radius: 4px; font-weight: bold;}
        .stat-box span { display: block; font-size: 24px; margin-top: 5px; }
        .hidden { display: none !important; }

        /* Review Screen Styles */
        .review-card { border: 2px solid; padding: 15px; border-radius: 6px; margin-bottom: 20px; background: #fff;}
        .review-correct { border-color: var(--green-status); box-shadow: 0 0 5px rgba(40,167,69,0.2); }
        .review-incorrect { border-color: var(--red-status); box-shadow: 0 0 5px rgba(220,53,69,0.2); }
        .review-unattempted { border-color: #999; background: #f9f9f9; }
        .review-answers { margin-top: 15px; padding: 10px; background: #eee; border-radius: 4px; font-size: 15px; }
        .review-answers p { margin: 5px 0; }
    </style>
</head>
<body>

    <div id="warning-banner" class="warning-banner">
        WARNING: Tab switching or exiting full screen is prohibited.
    </div>

    <div id="top-bar" class="hidden">
        <span id="exam-title">JEE Advanced Simulator</span>
        <span id="timer-display">03:00:00</span>
    </div>

    <div id="selection-screen">
        <h1 style="color: var(--primary-blue); text-align: center;">JEE Advanced Practice Simulator</h1>
        <p style="text-align:center;">Select a paper to launch the CBT interface.</p>
        <div class="paper-grid">
            <button class="btn-large" onclick="startTest('2024_P1')">JEE Advanced 2024 - Paper 1</button>
            <button class="btn-large" onclick="startTest('2024_P2')">JEE Advanced 2024 - Paper 2</button>
            <button class="btn-large" onclick="startTest('2025_P1')">JEE Advanced 2025 - Paper 1</button>
            <button class="btn-large" onclick="startTest('2025_P2')">JEE Advanced 2025 - Paper 2</button>
        </div>
    </div>

    <div id="test-screen" class="hidden">
        <div id="left-panel">
            <div id="section-tabs">
                <button class="tab-btn active" onclick="switchSection('Physics')" id="tab-Physics">Physics</button>
                <button class="tab-btn" onclick="switchSection('Chemistry')" id="tab-Chemistry">Chemistry</button>
                <button class="tab-btn" onclick="switchSection('Mathematics')" id="tab-Mathematics">Mathematics</button>
            </div>
            <div id="question-area"></div>
            <div id="action-bar">
                <button class="btn-action btn-clear" onclick="clearResponse()">Clear Response</button>
                <button class="btn-action btn-save" onclick="saveAndNext()">Save & Next</button>
            </div>
        </div>
        <div id="right-panel">
            <div id="palette-header">Question Palette<br><span id="palette-section-name" style="font-size: 14px; font-weight: normal;">Physics</span></div>
            <div style="padding: 10px; font-size: 12px; display: flex; justify-content: space-around; border-bottom: 1px solid #ccc;">
                <div><span style="display:inline-block; width:12px; height:12px; background:var(--gray-status);"></span> Not Visited</div>
                <div><span style="display:inline-block; width:12px; height:12px; background:var(--red-status);"></span> Not Answered</div>
                <div><span style="display:inline-block; width:12px; height:12px; background:var(--green-status);"></span> Answered</div>
            </div>
            <div id="palette-grid"></div>
            <button class="submit-test-btn" onclick="submitTest(false)">Submit Paper</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h1 style="color: var(--primary-blue); text-align: center;">Score Card</h1>
        <h2 id="total-score-display" style="text-align: center;">Total Score: 0</h2>
        <div id="section-results"></div>
        <button class="btn-large" style="width: 100%; margin-top: 10px; background: var(--green-status); color: white;" onclick="openReview()">Review Paper</button>
        <button class="btn-large" style="width: 100%; margin-top: 10px; background: var(--primary-blue); color: white;" onclick="location.reload()">Return to Home</button>
    </div>

    <div id="review-screen" class="hidden">
        <h1 style="color: var(--primary-blue); text-align: center;">Paper Review</h1>
        <div id="review-container">
            </div>
        <button class="btn-large" style="width: 100%; margin-top: 20px; background: var(--primary-blue); color: white;" onclick="location.reload()">Return to Home</button>
    </div>

<script>
    // --- DATABASE WITH NEW SCHEMAS ---
    const papersData = {
        "2024_P1": [
            // --- MATHEMATICS: SECTION 1 (Single Correct) ---
            { 
                id: 1, 
                section: "Mathematics", 
                type: "mcq", 
                question: "Let f(x) be a continuously differentiable function on the interval (0, &infin;) such that f(1) = 2 and lim<sub>t&rarr;x</sub> [t<sup>10</sup>f(x) - x<sup>10</sup>f(t)] / [t<sup>9</sup> - x<sup>9</sup>] = 1 for each x > 0. Then, for all x > 0, f(x) is equal to",

    // --- LEAVE YOUR papersData ABOVE THIS LINE ---

    let currentPaperId = null;
    let currentSection = "Physics";
    let activeQuestions = []; 
    let currentQuestionIndex = 0; 
    
    let userAnswers = {}; 
    let questionStatus = {}; 
    
    let timeRemaining = 3 * 60 * 60;
    let timerInterval = null;
    let violationCount = 0;

    history.pushState(null, null, location.href);
    window.onpopstate = () => history.go(1);

    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden" && currentPaperId !== null && !document.getElementById('test-screen').classList.contains('hidden')) {
            handleViolation("Tab switched or window minimized!");
        }
    });

    document.addEventListener("fullscreenchange", () => {
        if (!document.fullscreenElement && currentPaperId !== null && !document.getElementById('test-screen').classList.contains('hidden')) {
            handleViolation("Exited full screen!");
        }
    });

    function handleViolation(msg) {
        violationCount++;
        const banner = document.getElementById('warning-banner');
        banner.style.display = 'block';
        banner.innerText = `WARNING: ${msg} (Violation ${violationCount}/2).`;
        if (violationCount >= 2) submitTest(true);
    }

    function startTest(paperId) {
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen();
        }
        currentPaperId = paperId;
        userAnswers = {};
        questionStatus = {};
        
        if(papersData[paperId]) {
            papersData[paperId].forEach(q => {
                const qKey = `${q.section}_${q.id}`;
                questionStatus[qKey] = 'gray';
            });
        }

        document.getElementById('selection-screen').classList.add('hidden');
        document.getElementById('test-screen').classList.remove('hidden');
        document.getElementById('top-bar').classList.remove('hidden');
        document.getElementById('exam-title').innerText = paperId.replace('_', ' ');

        switchSection("Physics");
        startTimer();
    }

    function startTimer() {
        const display = document.getElementById('timer-display');
        timerInterval = setInterval(() => {
            timeRemaining--;
            let h = Math.floor(timeRemaining / 3600);
            let m = Math.floor((timeRemaining % 3600) / 60);
            let s = timeRemaining % 60;
            display.innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if (timeRemaining <= 0) submitTest(true);
        }, 1000);
    }

    function switchSection(sectionName) {
        currentSection = sectionName;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${sectionName}`).classList.add('active');
        document.getElementById('palette-section-name').innerText = sectionName;

        activeQuestions = papersData[currentPaperId].filter(q => q.section === sectionName);
        
        currentQuestionIndex = 0;
        if (activeQuestions.length > 0) {
            loadQuestion(0);
        } else {
            document.getElementById('question-area').innerHTML = "<p>No questions added to this section yet.</p>";
            renderPalette();
        }
    }

    function loadQuestion(index) {
        currentQuestionIndex = index;
        const q = activeQuestions[index];
        const qKey = `${q.section}_${q.id}`; 
        if (questionStatus[qKey] === 'gray') questionStatus[qKey] = 'red';
        renderQuestionArea(q);
        renderPalette();
    }

    function renderQuestionArea(q) {
        const container = document.getElementById('question-area');
        const qKey = `${q.section}_${q.id}`; 
        let inputHTML = '';
        
        if (q.type === 'numerical') {
            const savedValue = userAnswers[qKey] !== undefined ? userAnswers[qKey] : '';
            inputHTML = `
                <div style="margin-top: 20px;">
                    <label style="font-weight: bold; display: block; margin-bottom: 10px;">Enter Numerical Value:</label>
                    <input type="number" step="any" class="numerical-input" id="num_input_${qKey}" placeholder="e.g. 2.5" value="${savedValue}" oninput="recordNumerical('${qKey}', this.value)">
                </div>
            `;
        } else if (q.type === 'multimcq') {
            let savedArray = userAnswers[qKey] || [];
            q.options.forEach((opt, optIndex) => {
                const isChecked = savedArray.includes(optIndex) ? "checked" : "";
                inputHTML += `
                    <label class="option-label">
                        <input type="checkbox" name="current_q" value="${optIndex}" ${isChecked} onchange="recordMultiMCQ('${qKey}', ${optIndex}, this.checked)">
                        <span style="margin-left: 10px;">${opt}</span>
                    </label>
                `;
            });
        } else {
            if(q.options) {
                q.options.forEach((opt, optIndex) => {
                    const isChecked = userAnswers[qKey] === optIndex ? "checked" : "";
                    inputHTML += `
                        <label class="option-label">
                            <input type="radio" name="current_q" value="${optIndex}" ${isChecked} onchange="recordMCQ('${qKey}', ${optIndex})">
                            <span style="margin-left: 10px;">${opt}</span>
                        </label>
                    `;
                });
            }
        }

        container.innerHTML = `
            <div class="question-header">
                <span><strong>Question ${currentQuestionIndex + 1}</strong> [${(q.type || 'MCQ').toUpperCase()}]</span>
                <span>Marks: <strong>+${q.positiveMarks}</strong> | <strong>${q.negativeMarks}</strong></span>
            </div>
            <div class="question-text" style="margin-bottom: 25px; line-height: 1.6;">${q.question}</div>
            <div>${inputHTML}</div>
        `;
    }

    function renderPalette() {
        const grid = document.getElementById('palette-grid');
        grid.innerHTML = '';
        activeQuestions.forEach((q, idx) => {
            const qKey = `${q.section}_${q.id}`; 
            const statusColor = questionStatus[qKey];
            const btn = document.createElement('button');
            btn.className = `palette-btn status-${statusColor}`;
            btn.innerText = idx + 1;
            if (idx === currentQuestionIndex) btn.style.border = "3px solid #000";
            btn.onclick = () => loadQuestion(idx);
            grid.appendChild(btn);
        });
    }

    function recordMCQ(qKey, optionIndex) { userAnswers[qKey] = optionIndex; }

    function recordMultiMCQ(qKey, optionIndex, isChecked) {
        if (!userAnswers[qKey]) userAnswers[qKey] = [];
        if (isChecked) {
            userAnswers[qKey].push(optionIndex);
        } else {
            userAnswers[qKey] = userAnswers[qKey].filter(val => val !== optionIndex);
            if (userAnswers[qKey].length === 0) delete userAnswers[qKey];
        }
    }

    function recordNumerical(qKey, value) {
        if(value.trim() === '') delete userAnswers[qKey];
        else userAnswers[qKey] = value;
    }

    function clearResponse() {
        const q = activeQuestions[currentQuestionIndex];
        const qKey = `${q.section}_${q.id}`;
        delete userAnswers[qKey];
        questionStatus[qKey] = 'red'; 
        if(q.type === 'numerical' && document.getElementById(`num_input_${qKey}`)) {
            document.getElementById(`num_input_${qKey}`).value = '';
        }
        renderQuestionArea(q);
        renderPalette();
    }

    function saveAndNext() {
        const q = activeQuestions[currentQuestionIndex];
        const qKey = `${q.section}_${q.id}`;
        
        if (userAnswers[qKey] !== undefined) questionStatus[qKey] = 'green';
        else questionStatus[qKey] = 'red';

        if (currentQuestionIndex < activeQuestions.length - 1) loadQuestion(currentQuestionIndex + 1);
        else {
            renderPalette();
            alert("This is the last question in " + currentSection + ". Switch sections using the tabs above.");
        }
    }

    function submitTest(isAutoSubmit = false) {
        if (!isAutoSubmit && !confirm("Submit paper? You cannot return to the test.")) return;

        clearInterval(timerInterval);
        if (document.fullscreenElement) document.exitFullscreen();
        
        document.getElementById('top-bar').classList.add('hidden');
        document.getElementById('test-screen').classList.add('hidden');
        document.getElementById('warning-banner').style.display = 'none';
        
        let totalScore = 0;
        const stats = { Physics: getEmptyStat(), Chemistry: getEmptyStat(), Mathematics: getEmptyStat() };

        papersData[currentPaperId].forEach(q => {
            const qKey = `${q.section}_${q.id}`; 
            stats[q.section].total++;
            
            if (userAnswers[qKey] !== undefined) {
                let isCorrect = false;
                if (q.type === 'numerical') {
                    if (parseFloat(userAnswers[qKey]) === parseFloat(q.correctAnswer)) isCorrect = true;
                } else if (q.type === 'multimcq') {
                    const userArr = [...userAnswers[qKey]].sort();
                    const correctArr = [...q.correctIndices].sort();
                    if (JSON.stringify(userArr) === JSON.stringify(correctArr)) isCorrect = true;
                } else {
                    if (userAnswers[qKey] === q.correctIndex) isCorrect = true;
                }

                if (isCorrect) {
                    stats[q.section].correct++;
                    stats[q.section].score += q.positiveMarks;
                } else {
                    stats[q.section].incorrect++;
                    stats[q.section].score += q.negativeMarks;
                }
            } else {
                stats[q.section].unattempted++;
            }
        });

        Object.values(stats).forEach(s => totalScore += s.score);

        document.getElementById('total-score-display').innerText = `Total Score: ${totalScore}`;
        const container = document.getElementById('section-results');
        container.innerHTML = '';

        for (const [section, data] of Object.entries(stats)) {
            if (data.total === 0) continue;
            container.innerHTML += `
                <h3 style="color:var(--primary-blue); border-bottom: 2px solid #ccc; padding-bottom: 5px;">${section}</h3>
                <div class="stat-grid">
                    <div class="stat-box">Score <span style="color:var(--primary-blue)">${data.score}</span></div>
                    <div class="stat-box">Correct <span style="color:var(--green-status)">${data.correct}</span></div>
                    <div class="stat-box">Incorrect <span style="color:var(--red-status)">${data.incorrect}</span></div>
                    <div class="stat-box">Unattempted <span>${data.unattempted}</span></div>
                </div>
            `;
        }

        document.getElementById('result-screen').classList.remove('hidden');
        // Do NOT nullify currentPaperId here, because the review screen needs to know what paper was just taken!
    }

    // --- NEW: REVIEW LOGIC ---
    function openReview() {
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('review-screen').classList.remove('hidden');
        window.scrollTo(0, 0);

        const container = document.getElementById('review-container');
        container.innerHTML = '';

        if (!papersData[currentPaperId]) return;

        papersData[currentPaperId].forEach((q, index) => {
            const qKey = `${q.section}_${q.id}`;
            const userAnswer = userAnswers[qKey];
            
            let isCorrect = false;
            let statusText = "Unattempted";
            let cardClass = "review-unattempted";
            let answerHTML = '';

            // Grading Check
            if (userAnswer !== undefined) {
                if (q.type === 'numerical') {
                    if (parseFloat(userAnswer) === parseFloat(q.correctAnswer)) isCorrect = true;
                } else if (q.type === 'multimcq') {
                    const userArr = [...userAnswer].sort();
                    const correctArr = [...q.correctIndices].sort();
                    if (JSON.stringify(userArr) === JSON.stringify(correctArr)) isCorrect = true;
                } else {
                    if (userAnswer === q.correctIndex) isCorrect = true;
                }

                if (isCorrect) {
                    statusText = "Correct (+"+q.positiveMarks+")";
                    cardClass = "review-correct";
                } else {
                    statusText = "Incorrect ("+q.negativeMarks+")";
                    cardClass = "review-incorrect";
                }
            }

            // HTML Generation for Answers
            if (q.type === 'numerical') {
                answerHTML = `
                    <p>Your Answer: <strong style="color: ${userAnswer !== undefined ? (isCorrect ? 'green' : 'red') : 'black'};">${userAnswer !== undefined ? userAnswer : 'None'}</strong></p>
                    <p>Correct Answer: <strong>${q.correctAnswer}</strong></p>
                `;
            } else if (q.type === 'multimcq') {
                let userStr = userAnswer !== undefined ? userAnswer.map(i => q.options[i]).join(' <br> ') : 'None';
                let correctStr = q.correctIndices.map(i => q.options[i]).join(' <br> ');
                answerHTML = `
                    <p>Your Answer(s):</p> <div style="color: ${userAnswer !== undefined ? (isCorrect ? 'green' : 'red') : 'black'}; font-weight: bold; margin-bottom: 10px;">${userStr}</div>
                    <p>Correct Answer(s):</p> <strong>${correctStr}</strong>
                `;
            } else {
                let userStr = userAnswer !== undefined ? q.options[userAnswer] : 'None';
                let correctStr = q.options[q.correctIndex];
                answerHTML = `
                    <p>Your Answer: <strong style="color: ${userAnswer !== undefined ? (isCorrect ? 'green' : 'red') : 'black'};">${userStr}</strong></p>
                    <p>Correct Answer: <strong>${correctStr}</strong></p>
                `;
            }

            // Build the card
            container.innerHTML += `
                <div class="review-card ${cardClass}">
                    <div class="question-header" style="border-bottom: 1px solid #ddd; padding-bottom: 10px;">
                        <span style="font-size: 18px;"><strong>Q${index + 1} (${q.section})</strong></span>
                        <span style="font-size: 16px; font-weight: bold; color: ${isCorrect ? 'var(--green-status)' : (userAnswer !== undefined ? 'var(--red-status)' : '#666')};">${statusText}</span>
                    </div>
                    <div class="question-text" style="margin: 15px 0; font-size: 16px;">${q.question}</div>
                    <div class="review-answers">
                        ${answerHTML}
                    </div>
                </div>
            `;
        });
    }

    function getEmptyStat() { return { total: 0, correct: 0, incorrect: 0, unattempted: 0, score: 0 }; }
</script>
